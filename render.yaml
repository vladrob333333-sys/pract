services:
  - type: web
    name: task-reporting-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskreportingdb
          property: connectionString

databases:
  - name: taskreportingdb
    plan: free
    databaseName: taskreporting
    user: taskreporting_user
