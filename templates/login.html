{% extends "layout.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <h6>Тестовые учетные записи:</h6>
                    <div class="row">
                        <div class="col-md-6">
                            <p class="mb-1"><strong>Администратор:</strong></p>
                            <p class="mb-1">Логин: admin</p>
                            <p class="mb-1">Пароль: admin123</p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-1"><strong>Работник:</strong></p>
                            <p class="mb-1">Логин: ivanov</p>
                            <p class="mb-1">Пароль: worker123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
